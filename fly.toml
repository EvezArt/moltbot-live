# fly.toml — EVEZ VCL Live Stream on Fly.io
app = "evez-vcl-live"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.vcl"

[env]
  STREAM_DISPLAY = ":99"
  STREAM_WIDTH = "1280"
  STREAM_HEIGHT = "720"
  FPS = "30"
  BITRATE = "2500k"
  YOUTUBE_RTMP_URL = "rtmp://a.rtmp.youtube.com/live2"
  VCL_HTML = "/app/visualizer/index.html"

[[vm]]
  size = "performance-2x"
  memory = 4096
  cpus = 2

# No HTTP service — streaming-only container
# Health check via internal process monitoring

[processes]
  app = "bash run_forever.sh"

[restart]
  policy = "always"
  max_retries = 0
